<script>
    const NAME=sessionStorage.getItem("pageName");
    if(!sessionStorage.getItem("pageName")||!localStorage.getItem(NAME)){
        const body=document.querySelector("body");
        const NAME="Home";
        const CSSNAME=NAME+"Styles";
        const JSNAME=NAME+"Functions";
        body.innerHTML=localStorage.getItem(NAME);
        ROUTECSS(localStorage.getItem(CSSNAME));
        ROUTEJS(localStorage.getItem(JSNAME));
    }else{
        const body=document.querySelector("body");
        const NAME=sessionStorage.getItem("pageName");
        const CSSNAME=NAME+"Styles";
        const JSNAME=NAME+"Functions";
        body.innerHTML=localStorage.getItem(NAME);
        ROUTECSS(localStorage.getItem(CSSNAME));
        ROUTEJS(localStorage.getItem(JSNAME));
    }
</script>
