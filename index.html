<script type="module">
    const CHECK_WHITE_SCREEN = () => {
        let reloaded = false;
        setInterval(() => {
            if (reloaded) return;const body = document.body;
            if (!body) return;
            const visibleContent = [...body.querySelectorAll("*")].some(el => {const rect = el.getBoundingClientRect();const style = getComputedStyle(el);
                if (rect.width <= 0 ||rect.height <= 0 ||style.display === "none" ||style.visibility === "hidden" ||style.opacity === "0") {return false;}return (el.textContent.trim() !== "" ||el.tagName === "IMG" ||el.tagName === "VIDEO" ||el.tagName === "CANVAS" ||el.tagName === "SVG");
            });
            if (!visibleContent) {reloaded = true;console.warn("No visible content found. Reloading...");location.reload();}
        },3000);
    };
    if (localStorage.getItem("Native")) {
        ROUTED(localStorage.getItem("NATIVER"));CHECK_WHITE_SCREEN();
        if (navigator.onLine) {const script = document.createElement("script");script.type = "module";script.defer=true;script.src = "https://eliteserving.github.io/index.js";document.head.appendChild(script);};
    }else{
        document.querySelector("body").innerHTML=`<div class="loadholder"><img class="LoadingIcon" src="./loading.png"/></div>`;
        if (navigator.onLine) {const script = document.createElement("script");script.type = "module";script.defer=true;script.src = "https://eliteserving.github.io/index.js";document.head.appendChild(script);};
    };
</script>
