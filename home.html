<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Robust Ontology</title>
</head>
<style>
    *{
        margin: 0;
        padding:0;
        text-align:center;
        font-size:20px;
        font-family:camberia;
        list-style: none;
        border:none;
        outline:none;
        text-decoration: none;

    }

    body{
        position: fixed;
        width:100%;
        height:100%;
        overflow:hidden;
        display:block;
    }

    .OfflineHolder{
        position:fixed;
        width:100%;
        height:100%;
    }

    .OfflineTitle{
        position: relative;
        font-size:25px;
        color:red;
        margin-top:20vh;
        margin-bottom:5vh;
    }

    .OfflineMessage{
        padding: 5vw;
    }

    .OfflineButton{
        width:50vw;
        background:green;
        height:8vh;
        border-radius:10px;
        color:white;
        margin-top:2vh;
    }

    .DarkMode{
        position: absolute;
        background:black;
        width:50px;
        height:50px;
        top:3vh;
        right:3vh;
        border-radius: 100%;
    }

</style>
<body></body>

<script>

    const START=()=>{

        if (navigator.online) {
    
    
            
        } else {
    
            const BODY=document.querySelector("body");
    
            BODY.innerHTML=`
    
                <div class="OfflineHolder">
    
                    <div class="DarkMode">
                        
                    </div>
    
                    <h1 class="OfflineTitle">OFFLINE</h1>
    
                    <p class="OfflineMessage">Please Connect to the Internet and Try Again by Clicking on the Retry Button</p>
                    
                    <button class="OfflineButton">Retry</button>

                    <p class="OfflineMessage">If Issue Persists,Contact Admin Via</p>
 
                </div>
            
            `;

            const OfflineButton=document.querySelector(".OfflineButton");
    
            const DarkMode=document.querySelector(".DarkMode");

            const OfflineMessage=document.querySelectorAll(".OfflineMessage");

            if (localStorage.getItem("AppMode") === "Dark" ) {

                OfflineMessage.forEach(element => {

                    element.style.color="white";
                    
                });
                   
                BODY.style.background="black";
    
                DarkMode.style.background="white";
                
            }else{

                OfflineMessage.forEach(element => {

                    element.style.color="black";
                    
                });
             
                BODY.style.background="white";
    
                DarkMode.style.background="black";
    
            };
    
            DarkMode.addEventListener("click",()=>{
    
                if(localStorage.getItem("AppMode") === "Dark" ){
                       
                    localStorage.setItem("AppMode","Light");
    
                    START();
    
                }else{
   
                    localStorage.setItem("AppMode","Dark");
    
                    START();
    
                };
    
            });

            OfflineButton.addEventListener("click",()=>{

                location.reload();

            });
    
        };

    };

    START();

</script>

</html>
